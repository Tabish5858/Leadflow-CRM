name: Deploy Firestore Rules & Indexes

on:
  workflow_dispatch:  # TEST: remove before merging
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'

env:
  FIREBASE_TOOLS_VERSION: '13.32.0'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Firebase CLI
        run: npm install -g firebase-tools@${{ env.FIREBASE_TOOLS_VERSION }}

      - name: Deploy Firestore Rules & Indexes
        env:
          SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Write service account key to temp file (heredoc prevents shell expansion)
          cat > /tmp/gcp-key.json <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          EOF
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json

          firebase deploy \
            --project leadflow-cde37 \
            --only firestore:rules,firestore:indexes \
            --non-interactive
